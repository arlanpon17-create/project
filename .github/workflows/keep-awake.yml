name: Keep Supabase Awake

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth health
        env:
          SUPABASE_URL: https://yyssvhjunbofxzqtzgcq.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5c3N2aGp1bmJvZnh6cXR6Z2NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3Njg4NTksImV4cCI6MjA5ODM0NDg1OX0.YBSxpaTZWRM-vcwHcldjrlBELOjDNPuhtmSkN6N_QqE
        run: |
          http_code=$(curl -sS -o /tmp/supabase-health.txt -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/auth/v1/health")
          echo "HTTP code: ${http_code}"
          if [ "${http_code}" != "200" ]; then
            cat /tmp/supabase-health.txt
            exit 1
          fi
